# Blueprint Render — backend Genotipia (plan free demo)
# Docs: DEMO-DEPLOY.md
# Tras conectar el repo, asigne DATABASE_URL (Neon) y SECRET_KEY en el panel de Render.

services:
  - type: web
    name: genotipia-api
    runtime: python
    rootDir: laboratorio-bioquimica-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: AUTO_MIGRATE
        value: "true"
      - key: RUN_LEGACY_SCHEMA_PATCHES
        value: "true"
      - key: RUN_DATA_BACKFILL
        value: "false"
      - key: FRONTEND_URL
        value: https://genotipia-lab.vercel.app
      - key: API_PUBLIC_URL
        value: https://genotipia-api.onrender.com
      - key: CORS_ORIGINS
        value: https://genotipia-lab.vercel.app
      - key: PUBLIC_SITE_URL
        value: https://genotipia-lab.vercel.app
      - key: SKIP_MRP_ON_APROBAR
        value: "true"
      - key: PDF_WATERMARK
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true

<div class="login-wrapper">
  <div class="login-card glass">
    <div class="card-header">
      <app-brand-logo size="full" theme="dark" />
      <p>Acceso restringido para Bioquímicos y personal autorizado.</p>
    </div>

    @if (error()) {
      <div class="alert alert-danger">
        ⚠️ {{ error() }}
      </div>
    }

    <form (ngSubmit)="realizarLogin()" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="ejemplo@laboratorio.com" 
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="••••••••" 
          required
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="cargando()">
        @if (cargando()) {
          Autenticando...
        } @else {
          Ingresar al Panel
        }
      </button>
    </form>

    <div class="card-footer">
      <a [routerLink]="['/']" class="back-link">← Volver a la página principal</a>
    </div>
  </div>
</div>

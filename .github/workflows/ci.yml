name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laboratorio-bioquimica-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: laboratorio-bioquimica-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///./test_ci.db
          SECRET_KEY: ci_test_secret_key
          AUTO_MIGRATE: "true"
          RUN_LEGACY_SCHEMA_PATCHES: "true"
          RUN_DATA_BACKFILL: "false"
        run: pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laboratorio-bioquimica-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: laboratorio-bioquimica-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build -- --configuration=production
